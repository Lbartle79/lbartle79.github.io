<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }

#controls {
  padding:10px;
  background:#eee;
}

#map {
  height:500px;
}
</style>
</head>

<body>

<div id="controls">
<label>Day:</label>
<select id="daySelect"></select>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// MAP
let map = L.map('map').setView([53.5, -105.5], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let routeLayer = L.layerGroup().addTo(map);

// LOAD CSV + PARSE
async function loadCSV(){

  let response = await fetch("./location_history_raw_dump.csv");
  let text = await response.text();

  let points = [];

  text.split("\n").forEach(line => {

    let geo = line.match(/geo:([0-9\.-]+),([0-9\.-]+)/);
    let time = line.match(/startTime":"([^"]+)/);

    if(geo && time){
      points.push({
        lat: parseFloat(geo[1]),
        lng: parseFloat(geo[2]),
        time: new Date(time[1])
      });
    }

  });

  return points;
}

// GROUP BY DAY
function groupByDay(points){

  let days = {};

  points.forEach(p => {

    let day = p.time.toISOString().slice(0,10);

    if(!days[day]) days[day] = [];

    days[day].push(p);

  });

  return days;
}

// ADDRESS LOOKUP
async function getAddress(lat, lng){
  try {
    let r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
    let data = await r.json();
    return data.display_name || "Address unavailable";
  } catch {
    return "Address unavailable";
  }
}

// LOAD DAY
function loadDay(points){

  routeLayer.clearLayers();

  let bounds = [];

  points.forEach((p, index) => {

    let marker = L.circleMarker([p.lat, p.lng], {
      radius: 6,
      color: "orange"
    }).addTo(routeLayer);

    marker.bindPopup("Loading address...");

    getAddress(p.lat, p.lng).then(addr => {
      marker.setPopupContent(
        "Stop #" + (index+1) + "<br>" +
        p.time.toLocaleString() + "<br>" +
        addr
      );
    });

    bounds.push([p.lat, p.lng]);
  });

  if(bounds.length > 0){
    map.fitBounds(bounds);
  }
}

// INIT
async function init(){

  let allPoints = await loadCSV();
  let days = groupByDay(allPoints);

  let daySelect = document.getElementById("daySelect");

  Object.keys(days).sort().forEach(day => {

    let opt = document.createElement("option");
    opt.value = day;
    opt.text = day;

    daySelect.appendChild(opt);

  });

  daySelect.onchange = () => {
    loadDay(days[daySelect.value]);
  };

  let firstDay = Object.keys(days)[0];
  daySelect.value = firstDay;
  loadDay(days[firstDay]);

}

init();

</script>

</body>
</html>
