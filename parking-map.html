<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }
#controls { padding:10px; background:#eee; }
#map { height:500px; }
</style>
</head>

<body>

<div id="controls">
<label>Day:</label>
<select id="daySelect"></select>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([53.5, -105.5], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let routeLayer = L.layerGroup().addTo(map);

// LOAD CSV
async function loadCSV(){

  let response = await fetch("./location_history_raw_dump.csv");
  let text = await response.text();

  let lines = text.split("\n");

  let points = [];

  lines.forEach(line => {

    // MUCH MORE FORGIVING PARSER
    if(line.includes("geo:")){

      let geoMatch = line.match(/geo:([0-9\.-]+),([0-9\.-]+)/);

      if(geoMatch){

        let lat = parseFloat(geoMatch[1]);
        let lng = parseFloat(geoMatch[2]);

        let timeMatch = line.match(/"startTime":"([^"]+)/);

        let time = timeMatch ? new Date(timeMatch[1]) : new Date();

        points.push({lat, lng, time});
      }
    }

  });

  console.log("TOTAL POINTS:", points.length);

  return points;
}

// GROUP BY DAY
function groupByDay(points){

  let days = {};

  points.forEach(p => {

    let day = p.time.toISOString().slice(0,10);

    if(!days[day]) days[day] = [];

    days[day].push(p);

  });

  return days;
}

// LOAD DAY
function loadDay(points){

  routeLayer.clearLayers();

  let bounds = [];

  points.forEach((p, index) => {

    let marker = L.circleMarker([p.lat, p.lng], {
      radius: 5,
      color: "orange"
    }).addTo(routeLayer);

    marker.bindPopup("Loading...");

    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${p.lat}&lon=${p.lng}`)
      .then(r => r.json())
      .then(data => {
        marker.setPopupContent(
          "Stop #" + (index+1) + "<br>" +
          p.time.toLocaleString() + "<br>" +
          (data.display_name || "No address")
        );
      })
      .catch(() => {
        marker.setPopupContent("Address unavailable");
      });

    bounds.push([p.lat, p.lng]);

  });

  if(bounds.length > 0){
    map.fitBounds(bounds);
  }
}

// INIT
async function init(){

  let allPoints = await loadCSV();

  // 🚨 DEBUG: if nothing parsed, show fallback points
  if(allPoints.length === 0){

    console.log("CSV FAILED — showing test points");

    allPoints = [
      {lat:53.2033, lng:-105.7531, time:new Date()},
      {lat:53.2100, lng:-105.7400, time:new Date()},
      {lat:53.1900, lng:-105.7600, time:new Date()}
    ];
  }

  let days = groupByDay(allPoints);

  let daySelect = document.getElementById("daySelect");

  Object.keys(days).sort().forEach(day => {

    let opt = document.createElement("option");
    opt.value = day;
    opt.text = day;

    daySelect.appendChild(opt);

  });

  daySelect.onchange = () => {
    loadDay(days[daySelect.value]);
  };

  let firstDay = Object.keys(days)[0];
  daySelect.value = firstDay;

  loadDay(days[firstDay]);

}

init();

</script>

</body>
</html>
