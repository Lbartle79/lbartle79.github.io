<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS Stops</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: Arial;
}

#controls {
  padding: 10px;
  background: #eee;
}

#map {
  height: 500px;
}
</style>
</head>

<body>

<div id="controls">
  <label>Day:</label>
  <select id="daySelect"></select>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// MAP
let map = L.map('map').setView([53.5, -105.5], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

// LAYER
let routeLayer = L.layerGroup().addTo(map);

// DATA (your stops)
let data = {
  days: {
    "2026-01-01": [
      {lat:53.212, lng:-105.743, time:new Date()},
      {lat:53.230, lng:-105.700, time:new Date()},
      {lat:53.250, lng:-105.640, time:new Date()}
    ]
  }
};

// DROPDOWN
let daySelect = document.getElementById("daySelect");

Object.keys(data.days).forEach(day => {
  let opt = document.createElement("option");
  opt.value = day;
  opt.text = day;
  daySelect.appendChild(opt);
});

// LOAD DAY
function loadDay(day){

  routeLayer.clearLayers();

  let points = data.days[day];
  if(!points) return;

  let bounds = [];

  points.forEach((p, index) => {

    let marker = L.circleMarker([p.lat, p.lng], {
      radius: 6,
      color: "orange"
    }).addTo(routeLayer);

    marker.bindPopup("Loading address...");

    // SAFE address lookup (does NOT break markers)
    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${p.lat}&lon=${p.lng}`)
      .then(res => res.json())
      .then(data => {
        let address = data.display_name || "Address not found";

        marker.setPopupContent(
          "Stop #" + (index+1) + "<br>" +
          p.time.toLocaleTimeString() + "<br>" +
          address
        );
      })
      .catch(() => {
        marker.setPopupContent(
          "Stop #" + (index+1) + "<br>" +
          p.time.toLocaleTimeString() + "<br>" +
          "Address unavailable"
        );
      });

    bounds.push([p.lat, p.lng]);

  });

  if(bounds.length > 0){
    map.fitBounds(bounds);
  }
}

// EVENT
daySelect.onchange = () => loadDay(daySelect.value);

// INITIAL LOAD
let firstDay = Object.keys(data.days)[0];
daySelect.value = firstDay;
loadDay(firstDay);

</script>

</body>
</html>
