<!DOCTYPE html>
<html>
<head>
  <title>GPS Parking Stops</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin:0; }
    #map { height: 100vh; }
  </style>
</head>

<body>

<h2 style="padding:10px;">ALL GPS PARKING STOPS (RAW DATA)</h2>
<div id="map"></div>

<script>

var map = L.map('map').setView([52.8598, -104.6010], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

var stops = [

{lat:52.866185, lng:-104.596817, start:"01:12", duration:"16 min"},
{lat:52.859828, lng:-104.600928, start:"01:59", duration:"11 min"},
{lat:52.859083, lng:-104.601093, start:"02:25", duration:"20 min"},
{lat:52.859398, lng:-104.601077, start:"02:48", duration:"1h 37m"},
{lat:52.859875, lng:-104.601027, start:"04:32", duration:"8 min"},
{lat:52.860530, lng:-104.601073, start:"04:46", duration:"22 min"},
{lat:52.860071, lng:-104.601139, start:"05:09", duration:"22 min"}

];

// 🔥 ADD MORE DATA HERE (SAFE)
stops.push(

{lat:52.859852, lng:-104.601027, start:"2025-07-13 14:57", duration:"15 min"},
{lat:52.859903, lng:-104.600900, start:"2025-07-13 15:16", duration:"1h 14m"},
{lat:52.859743, lng:-104.601185, start:"2025-07-13 16:33", duration:"13 min"},
{lat:52.859915, lng:-104.601048, start:"2025-07-13 16:49", duration:"12 min"},
{lat:52.859815, lng:-104.601043, start:"2025-07-13 17:01", duration:"12 min"},
{lat:52.859997, lng:-104.601092, start:"2025-07-13 17:17", duration:"1h 26m"},
{lat:52.859923, lng:-104.601108, start:"2025-07-13 18:49", duration:"25 min"},
{lat:52.859872, lng:-104.601067, start:"2025-07-13 19:20", duration:"1h 14m"},
{lat:52.859918, lng:-104.601062, start:"2025-07-13 20:41", duration:"43 min"},
{lat:52.859998, lng:-104.600872, start:"2025-07-13 21:27", duration:"12 min"}

);

// 📍 ADD MARKERS
stops.forEach(function(stop) {
  L.circleMarker([stop.lat, stop.lng], {
    radius: 6
  })
  .addTo(map)
  .bindPopup(
    "Start: " + stop.start + "<br>Duration: " + stop.duration
  );
});

</script>

</body>
</html>
