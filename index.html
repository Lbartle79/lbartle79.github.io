<!DOCTYPE html>
<html>
<head>
  <title>GPS Parking Stops</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 100vh; }
    body { margin: 0; }
  </style>
</head>
<body>

<div id="map"></div>

<script>
// Create map centered around Melfort
var map = L.map('map').setView([52.86, -104.60], 13);

// Add map tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
}).addTo(map);

// 🔥 YOUR PARKING DATA (sample — we will expand this)
var stops = [
  {lat:52.866185, lng:-104.596817, start:"01:12", duration:"16 min"},
  {lat:52.859828, lng:-104.600928, start:"01:59", duration:"11 min"},
  {lat:52.859083, lng:-104.601093, start:"02:25", duration:"20 min"},
  {lat:52.859398, lng:-104.601077, start:"02:48", duration:"1h 37m"},
  {lat:52.859875, lng:-104.601027, start:"04:32", duration:"8 min"},
  {lat:52.860530, lng:-104.601073, start:"04:46", duration:"22 min"},
  {lat:52.860071, lng:-104.601139, start:"05:09", duration:"22 min"}
];

// Add markers
stops.forEach(function(stop) {
  L.circleMarker([stop.lat, stop.lng], {
    radius: 6
  }).addTo(map)
  .bindPopup("Start: " + stop.start + "<br>Duration: " + stop.duration);
});
</script>

</body>
</html>
