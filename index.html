<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Test Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    body { margin:0; }
    #map { height:100vh; }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// TEST: if you DON'T see this alert, your script isn't running
alert("Map script is running");

// MAP
var map = L.map('map').setView([52.8599, -104.6010], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

// SIMPLE TEST MARKER
L.circleMarker([52.8599, -104.6010], {
  radius: 8,
  color: "red"
}).addTo(map);

</script>

</body>
</html>
